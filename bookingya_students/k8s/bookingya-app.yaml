apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookingya-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookingya-app
  template:
    metadata:
      labels:
        app: bookingya-app
    spec:
      containers:
        - name: app
          image: localhost/bookingya-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: HOST_DB
              value: bookingya-db
            - name: PORT_DB
              value: "5432"
            - name: POSTGRES_DB
              value: bookingya
            - name: USERNAME_DB
              value: postgres
            - name: PASSWORD_DB
              value: root
---
apiVersion: v1
kind: Service
metadata:
  name: bookingya-app
spec:
  type: NodePort
  selector:
    app: bookingya-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
