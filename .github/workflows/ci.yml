name: CI - BookingYa Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      guestIdentification:
        description: 'Identificación del huésped'
        required: false
        default: '2034'
      guestName:
        description: 'Nombre del huésped'
        required: false
        default: 'PruebaQA2034'
      guestEmail:
        description: 'Email del huésped'
        required: false
        default: 'PruebaQA2034@PruebaQA2034.com'
      roomCode:
        description: 'Código de habitación'
        required: false
        default: '2034'
      roomName:
        description: 'Nombre de habitación'
        required: false
        default: 'HabitacionQA'

      atddGuestIdentification:
        description: 'ATDD - Identificación del huésped'
        required: false
        default: '2225'
      atddGuestName:
        description: 'ATDD - Nombre del huésped'
        required: false
        default: 'PruebaQA2225'
      atddGuestEmail:
        description: 'ATDD - Email del huésped'
        required: false
        default: 'PruebaQA2225@PruebaQA2225.com'
      atddRoomCode:
        description: 'ATDD - Código de habitación'
        required: false
        default: '2225'
      atddRoomName:
        description: 'ATDD - Nombre de habitación'
        required: false
        default: 'HabitacionQA'

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookingya
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d bookingya"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run application (Spring Boot)
        working-directory: bookingya_students
        run: |
          mvn clean spring-boot:run -e &
          sleep 60

      - name: Give Gradle permissions
        run: |
          chmod +x UnitTestBookinYa/gradlew
          chmod +x PruebaBooking/gradlew
          chmod +x PruebaBookingATDD/gradlew

      - name: Run TDD unit tests (Suite)
        working-directory: UnitTestBookinYa
        run: |
          ./gradlew clean test \
            --tests "com.project.bookingya.unit.SuiteReservationUnitTestCase" \
            --stacktrace

      - name: Run BDD tests (ReservationSuiteRunner)
        working-directory: PruebaBooking
        env:
          GUEST_IDENTIFICATION: ${{ github.event.inputs.guestIdentification || '2034' }}
          GUEST_NAME: ${{ github.event.inputs.guestName || 'PruebaQA2034' }}
          GUEST_EMAIL: ${{ github.event.inputs.guestEmail || 'PruebaQA2034@PruebaQA2034.com' }}
          ROOM_CODE: ${{ github.event.inputs.roomCode || '2034' }}
          ROOM_NAME: ${{ github.event.inputs.roomName || 'HabitacionQA' }}
        run: |
          echo "=============================================="
          echo "EJECUCIÓN BDD - ReservationSuiteRunner"
          echo "Guest: $GUEST_IDENTIFICATION - $GUEST_NAME"
          echo "Room: $ROOM_CODE - $ROOM_NAME"
          echo "=============================================="

          ./gradlew clean test \
            --tests "*ReservationSuiteRunner" \
            --stacktrace \
            -DguestIdentification="$GUEST_IDENTIFICATION" \
            -DguestName="$GUEST_NAME" \
            -DguestEmail="$GUEST_EMAIL" \
            -DroomCode="$ROOM_CODE" \
            -DroomName="$ROOM_NAME"

          ./gradlew aggregate

      - name: Run ATDD tests (ReservationSuiteATDDRunner)
        working-directory: PruebaBookingATDD
        env:
          ATDD_GUEST_IDENTIFICATION: ${{ github.event.inputs.atddGuestIdentification || '2225' }}
          ATDD_GUEST_NAME: ${{ github.event.inputs.atddGuestName || 'PruebaQA2225' }}
          ATDD_GUEST_EMAIL: ${{ github.event.inputs.atddGuestEmail || 'PruebaQA2225@PruebaQA2225.com' }}
          ATDD_ROOM_CODE: ${{ github.event.inputs.atddRoomCode || '2225' }}
          ATDD_ROOM_NAME: ${{ github.event.inputs.atddRoomName || 'HabitacionQA' }}
        run: |
          echo "=============================================="
          echo "EJECUCIÓN ATDD - ReservationSuiteATDDRunner"
          echo "Guest: $ATDD_GUEST_IDENTIFICATION - $ATDD_GUEST_NAME"
          echo "Room: $ATDD_ROOM_CODE - $ATDD_ROOM_NAME"
          echo "=============================================="

          ./gradlew clean test \
            --tests "*ReservationSuiteATDDRunner" \
            --stacktrace \
            -DatddGuestIdentification="$ATDD_GUEST_IDENTIFICATION" \
            -DatddGuestName="$ATDD_GUEST_NAME" \
            -DatddGuestEmail="$ATDD_GUEST_EMAIL" \
            -DatddRoomCode="$ATDD_ROOM_CODE" \
            -DatddRoomName="$ATDD_ROOM_NAME"

          ./gradlew aggregate

      - name: Upload BDD Serenity report
        uses: actions/upload-artifact@v4
        with:
          name: serenity-bdd-report
          path: PruebaBooking/target/site/serenity

      - name: Upload ATDD Serenity report
        uses: actions/upload-artifact@v4
        with:
          name: serenity-atdd-report
          path: PruebaBookingATDD/target/site/serenity