name: CI - BookingYa Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      guestIdentification:
        description: 'Identificación del huésped'
        required: false
        default: '2012'
      guestName:
        description: 'Nombre del huésped'
        required: false
        default: 'PruebaQA2012'
      guestEmail:
        description: 'Email del huésped'
        required: false
        default: 'PruebaQA2012@PruebaQA2012.com'
      roomCode:
        description: 'Código de habitación'
        required: false
        default: '2012'
      roomName:
        description: 'Nombre de habitación'
        required: false
        default: 'HabitacionQA'

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: bookingya
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d bookingya"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run application (Spring Boot - Tomcat)
        working-directory: bookingya_students
        run: |
          mvn clean spring-boot:run -e &
          sleep 60

      - name: Give Gradle permissions
        run: |
          chmod +x UnitTestBookinYa/gradlew
          chmod +x PruebaBooking/gradlew

      - name: Run TDD unit tests (Suite)
        working-directory: UnitTestBookinYa
        run: |
          ./gradlew clean test --tests "com.project.bookingya.unit.SuiteReservationUnitTestCase"

      - name: Run BDD tests (PruebaBooking)
        working-directory: PruebaBooking
        env:
          GUEST_IDENTIFICATION: ${{ github.event.inputs.guestIdentification || '2012' }}
          GUEST_NAME: ${{ github.event.inputs.guestName || 'PruebaQA2012' }}
          GUEST_EMAIL: ${{ github.event.inputs.guestEmail || 'PruebaQA2012@PruebaQA2012.com' }}
          ROOM_CODE: ${{ github.event.inputs.roomCode || '2012' }}
          ROOM_NAME: ${{ github.event.inputs.roomName || 'HabitacionQA' }}
        run: |
          echo "=============================================="
          echo "EJECUCIÓN DE PRUEBAS BDD - PruebaBooking"
          echo "Feature: Create reservation"
          echo "Se validan los siguientes escenarios:"
          echo "- Creación de huésped"
          echo "- Creación de habitación"
          echo "- Creación de reserva exitosa"
          echo "=============================================="

          ./gradlew clean test aggregate \
            -DguestIdentification="$GUEST_IDENTIFICATION" \
            -DguestName="$GUEST_NAME" \
            -DguestEmail="$GUEST_EMAIL" \
            -DroomCode="$ROOM_CODE" \
            -DroomName="$ROOM_NAME"

      - name: Upload BDD Serenity report
        uses: actions/upload-artifact@v4
        with:
          name: serenity-bdd-report
          path: PruebaBooking/target/site/serenity